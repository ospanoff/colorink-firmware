; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
;   Please visit documentation for the other options and examples
;   https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32s3
framework = arduino

; XIAO_ESP32S3_Plus — from espressif/arduino-esp32 boards.txt (board id XIAO_ESP32S3_Plus)
board_build.variant = XIAO_ESP32S3_Plus
board_build.f_cpu = 240000000L
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.flash_freq = 80m
board_build.flash_mode = dio
board_build.boot_freq = 80m
; Default partition scheme in boards.txt is ffat (16M Flash 2MB APP / 12.5MB FATFS)
board_build.partitions = ffat.csv
; boards.txt: PSRAM menu "OPI PSRAM" — opi + BOARD_HAS_PSRAM (hardware on Plus)
board_build.psram_type = opi
board_build.memory_type = qio_opi

; boards.txt base: usb_mode=0 (USB-OTG TinyUSB), cdc_on_boot=1
build_unflags =
  -DARDUINO_XIAO_ESP32S3
  -DARDUINO_USB_MODE=1
build_flags =
  -DARDUINO_XIAO_ESP32S3_PLUS
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM
